<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>WeMate</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      background: #0a0a0f;
      color: #f0f0f0;
      width: 320px;
      min-height: 250px;
    }
    .header {
      padding: 14px 16px;
      background: #0a0a0f;
      border-bottom: 1px solid #15151f;
      display: flex; align-items: center; justify-content: space-between;
    }
    .brand-wrap { display: flex; align-items: center; gap: 10px; }
    .brand-logo {
      width: 34px; height: 34px; border-radius: 50%;
      background: #fff; display: flex; align-items: center; justify-content: center;
      font-size: 18px; overflow: hidden; flex-shrink: 0;
    }
    .brand-logo img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    .brand-text-wrap { display: flex; flex-direction: column; }
    .brand-name { font-size: 15px; font-weight: 700; color: #fff; letter-spacing: -0.2px; }
    .brand-sub { font-size: 10px; color: #8a8a99; margin-top: 1px; }
    .content { padding: 14px 16px; }
    
    .btn {
      width: 100%; padding: 11px; border-radius: 8px; border: none;
      font-size: 13px; font-weight: 600; cursor: pointer;
      transition: all 0.15s; font-family: inherit;
      display: flex; justify-content: center; align-items: center; gap: 6px;
    }
    .btn-primary {
      background: linear-gradient(135deg, #6d28d9 0%, #4c1d95 100%);
      color: #fff; border: 1px solid rgba(167, 139, 250, 0.3); text-decoration: none;
    }
    .btn-primary:hover { background: linear-gradient(135deg, #7c3aed 0%, #5b21b6 100%); }
    .btn-danger {
      background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.3);
      padding: 6px 10px; font-size: 11px; width: auto;
    }
    .btn-danger:hover { background: rgba(239, 68, 68, 0.2); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    
    .error {
      background: rgba(239, 68, 68, 0.08); border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 8px; padding: 9px 11px; font-size: 12px;
      color: #ef4444; margin-bottom: 12px; text-align: center;
    }
    
    .user-info-card {
      display: flex; justify-content: space-between; align-items: center;
      background: #14141c; border: 1px solid #1f1f2c;
      border-radius: 10px; padding: 12px; margin-bottom: 16px;
    }
    .user-info-text { display: flex; flex-direction: column; gap: 2px; }
    .user-name { font-size: 13px; font-weight: 600; color: #fff; }
    .user-plan { font-size: 11px; color: #a78bfa; }
    
    .platform-list { display: flex; flex-direction: column; gap: 8px; }
    .platform-card {
      display: flex; justify-content: space-between; align-items: center;
      background: #1a1a24; border: 1px solid #2a2a3c;
      border-radius: 8px; padding: 10px 12px; cursor: pointer; transition: 0.2s;
    }
    .platform-card:hover { border-color: #7c3aed; background: #1f1f2c; }
    .platform-info { display: flex; flex-direction: column; gap: 2px; }
    .platform-name { font-size: 13px; font-weight: 600; color: #fff; }
    .platform-domain { font-size: 10px; color: #8a8a99; }
    
    .spinner {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.2); border-top-color: #fff;
      border-radius: 50%; animation: spin 0.6s linear infinite;
    }
    
    .not-connected-header { text-align: center; padding: 20px 0 10px; }
    .lock-emoji { font-size: 36px; margin-bottom: 10px; }
    .not-connected-header h3 { font-size: 16px; font-weight: 700; color: #fff; margin-bottom: 6px; }
    .not-connected-header p { font-size: 12px; color: #8a8a99; line-height: 1.5; padding: 0 10px; margin-bottom: 15px;}
    
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="header">
    <div class="brand-wrap">
      <div class="brand-logo"><img src="icon48.png" alt="Logo" onerror="this.style.display='none'"/></div>
      <div class="brand-text-wrap">
        <span class="brand-name">WeMate</span>
        <span class="brand-sub">Premium Access</span>
      </div>
    </div>
  </div>

  <!-- Loading State -->
  <div id="loading-screen" class="content" style="display:flex; justify-content:center; align-items:center; height: 150px;">
    <div class="spinner"></div>
  </div>

  <!-- Not Logged In Screen -->
  <div id="login-screen" class="content" style="display:none;">
    <div class="not-connected-header">
      <div class="lock-emoji">🔒</div>
      <h3>Not Connected</h3>
      <p>Please log into your WeMate Panel to access your platforms.</p>
      <a href="https://panel.shahabtech.com/user/dashboard" target="_blank" class="btn btn-primary">Open Dashboard</a>
    </div>
  </div>

  <!-- Dashboard / Platforms List -->
  <div id="dashboard-screen" class="content" style="display:none;">
    <div id="action-error" class="error" style="display:none"></div>
    
    <div class="user-info-card">
      <div class="user-info-text">
        <span class="user-name" id="display-name">Loading...</span>
        <span class="user-plan" id="display-plan">Plan: Loading...</span>
      </div>
    </div>
    
    <div style="font-size: 11px; color: #8a8a99; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em;">Available Platforms</div>
    
    <div id="platforms-container" class="platform-list">
      <!-- Platforms injected here via JS -->
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
